services:
  obsidian:
    build: .
    container_name: obsidian
    environment:
      - TEST_MODE=${TEST_MODE:-true}
      - GIT_REPO_URL=${GIT_REPO_URL}
      - GITHUB_PAT=${GITHUB_PAT}
      - OAUTH_ISSUER=${OAUTH_ISSUER:-https://accounts.google.com}
      - OAUTH_JWKS_URL=${OAUTH_JWKS_URL:-https://www.googleapis.com/oauth2/v3/certs}
      - OAUTH_AUDIENCE=${OAUTH_AUDIENCE:-}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET:-}
      - OAUTH_ALLOWED_EMAIL=${OAUTH_ALLOWED_EMAIL:-}
      - PUBLIC_HOST=${PUBLIC_HOST:-}
    ports:
      - 4000:4000 # MCP Server (Streamable HTTP + SSE)
    restart: unless-stopped
